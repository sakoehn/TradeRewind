# Configuration file for TradeRewind

[app]
name = "TradeRewind"
version = "1.0.0"

[database]
# Database connection settings
host = "localhost"
port = 5432
username = "user"
password = "password"

[logging]
# Logging settings
level = "INFO"
file = "logs/app.log"

[features]
# Feature toggles
enable_backtesting = true
enable_visualizations = true

[paths]
# File paths
data_directory = "data/"
charts_directory = "charts/"
strategies_directory = "strategies/"